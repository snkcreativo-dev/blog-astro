name: Deploy Astro Blog

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Resolve public URL
        shell: bash
        run: |
          if [[ -n "${{ vars.SITE_URL }}" ]]; then
            echo "SITE_URL=${{ vars.SITE_URL }}" >> "$GITHUB_ENV"
          else
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            OWNER="${GITHUB_REPOSITORY_OWNER}"

            if [[ "$REPO_NAME" == "${OWNER}.github.io" ]]; then
              echo "SITE_URL=https://${OWNER}.github.io" >> "$GITHUB_ENV"
            else
              echo "SITE_URL=https://${OWNER}.github.io/${REPO_NAME}" >> "$GITHUB_ENV"
            fi
          fi

          if [[ -n "${{ vars.BASE_PATH }}" ]]; then
            echo "BASE_PATH=${{ vars.BASE_PATH }}" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate project
        run: npm run check

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
